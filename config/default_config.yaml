# Paths to your YOLOX assets (edit before run)
model:
  exp_file: "/home/navavision/Utkarsh_workspace/inference-ui/dock_analytics/model/yolox_voc_s 3.py"           # absolute path to your *exp*.py
  checkpoint: "/home/navavision/Utkarsh_workspace/inference-ui/dock_analytics/model/best_ckpt 2.pth"         # .pth / .ckpt weights
  class_file: "/home/navavision/Utkarsh_workspace/inference-ui/dock_analytics/model/class-dock.txt"         # class.txt one class per line, order matches model head
  device: "cuda"         # cuda — fails at load if CUDA unavailable; use "cpu" to allow CPU
  conf_threshold: 0.6
  nms_threshold: 0.45
  test_size: [640, 640]  # [H, W] — should match training / exp if overridden

# ByteTrack (tune for your FPS). Slightly looser matching reduces extra IDs when boxes jitter.
tracking:
  track_thresh: 0.45
  track_buffer: 90
  match_thresh: 0.85
  mot20: false
  frame_rate: 30

# Person Re-ID (optional). Requires PyTorch; install torchreid for OSNet, else ResNet18 fallback.
reid:
  enabled: true
  device: "cuda"       # same rules as model.device
  model_name: "osnet_x1_0"
  input_size: [256, 128]   # H, W

# YOLOv8 pose on each person crop (torch.load + raw nn.Module; requires pip: ultralytics for unpickle)
pose:
  enabled: true
  weights: "/home/navavision/Utkarsh_workspace/inference-ui/dock_analytics/yolov8n-pose.pt"
  device: "cuda"
  imgsz: 640
  conf_threshold: 0.25
  iou_threshold: 0.7
  keypoint_conf_threshold: 0.25

  activity_motion_deadzone_norm: 0.019

  # Walking thresholds — any one triggers walking
  activity_active_lower_mean_threshold: 0.028
  activity_active_centroid_mean_threshold: 0.024
  activity_active_arm_mean_threshold: 0.040

  # Idle caps — all three must be below these for activity_idle_consecutive_frames in a row
  activity_idle_lower_mean_max: 0.016
  activity_idle_centroid_mean_max: 0.013
  activity_idle_arm_mean_max: 0.010
  activity_idle_consecutive_frames: 7

  # Smoothing
  activity_smooth_window: 18
  activity_stable_min_frames: 8

  # Arm weights
  activity_arm_wrist_weight: 1.0
  activity_arm_elbow_weight: 0.52
  activity_arm_shoulder_weight: 0.22

  # Sitting — motion stillness + spatial zone, no geometry
  activity_sit_centroid_mean_max: 0.005    # was 0.008 — seated guard is virtually motionless
  activity_sit_lower_mean_max: 0.006       # was 0.009 — standing still still has more lower body motion
  activity_sit_stable_min_frames: 12       # was 8 — need longer confirmation to avoid false positives
  activity_sit_bbox_x2_max: 0.32           # was 0.35 — tighter zone, only the guard desk corner # right edge of bbox must be in left 35% of frame; 0.0 = disabled

  # Keep these in config for reference but they are no longer used in logic
  activity_sit_torso_span_max: 0.42
  activity_sit_leg_ratio_max: 0.50
  activity_sit_knee_straight_deg: 182
  activity_sit_hip_flex_deg: 135
  activity_sit_strong_compress_ratio: 0.38

memory:
  cosine_threshold: 0.6
  max_gallery_size: 500
  feature_dim: 512
  # 0 = never expire (same person_N after they leave the frame and return). >0 = drop after N seconds unseen.
  ttl_seconds: 0
  ema_alpha: 0.3
  max_feats_per_person: 10

# Class names must match lines in class.txt (case-sensitive).
# class-dock.txt order: person, dock_open, truck, dock_closed, forklift, box_in_hand, pallet_load, no_truck
class_names:
  person: person
  dock_open: dock_open
  truck: truck
  dock_closed: dock_closed
  forklift: forklift
  box_in_hand: box_in_hand
  pallet_load: pallet_load
  no_truck: no_truck

# Dock regions: coordinates are normalized [0,1] relative to frame width/height
# x1,y1 = top-left, x2,y2 = bottom-right of the dock ROI (rectangle)
# ROI: X-AnyLabeling pixel xyxy [379, 0, 1952, 1405] on raw frame 2688×1520
docks:
  - id: 1
    name: "Dock 1"
    region_xyxy: [0.141012, 0.0, 0.72619, 0.924342]

# Optional default RTSP (overridden from UI)
sources:
  default_rtsp: "rtsp://user:pass@192.168.1.10/stream1"
